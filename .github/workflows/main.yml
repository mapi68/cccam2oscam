name: Build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.1

      - name: Install pyinstaller
        run: pip install pyinstaller

      - name: Install pipreqs
        run: pip install pipreqs

      - name: Generate requirements.txt
        run: |
          pipreqs --force .

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache UPX
        uses: actions/cache@v4
        with:
          path: |
            |-
              ${{ runner.os }}-upx
          key: upx-${{ runner.os }}-${{ hashFiles('upx/*.exe') }}
          restore-keys: |
            upx-${{ runner.os }}-

      - name: Set up UPX
        run: |
          choco install upx -y
          cp C:\ProgramData\chocolatey\lib\upx\tools\upx.exe Windows-upx/

      - name: Build EXE
        run: |
          pyinstaller cccam2oscam.spec

      - name: Create artifact
        run: |
          cd dist
          move cccam2oscam_*.exe ..

      - name: Save ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: cccam2oscam-win64
          path: cccam2oscam_*.exe
          
